name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node tests/run-contract-diff.mjs
      - run: npm run diff -- --baseline snapshots/beam-contract.baseline.json --current snapshots/beam-contract.current.json --json-out reports/beam-contract-diff.json
      - run: npm test
